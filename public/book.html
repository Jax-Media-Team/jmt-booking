<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book a call · Jax Media Team</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="/img/logo.jpg">
</head>
<body>
  <main class="shell">
    <header class="site-header">
      <a class="site-logo" href="/" aria-label="Jax Media Team home">
        <img src="/img/logo.jpg" alt="Jax Media Team">
      </a>
      <div class="header-meta">with <strong>Jax Media Team</strong></div>
    </header>

    <div class="card">
      <div class="booking">
        <aside class="booking-info">
          <span class="eyebrow">Book a Time</span>
          <h1 id="m-name">Loading…</h1>
          <p class="subtitle" id="m-desc"></p>

          <ul class="meta-list">
            <li><span class="meta-icon">⏱</span><span id="m-duration"></span></li>
            <li><span class="meta-icon">⌖</span><span id="m-location"></span></li>
            <li><span class="meta-icon">⌚</span><span id="m-tz"></span></li>
          </ul>

          <p class="long-description" id="m-long" hidden></p>

          <div id="m-agenda-block" hidden>
            <div class="agenda-title">We'll cover</div>
            <ul class="agenda-list" id="m-agenda"></ul>
          </div>

          <div class="prep-note" id="m-prep" hidden></div>
        </aside>

        <section class="picker">
          <div id="step-time">
            <div class="picker-header">
              <div class="picker-month" id="month-label"></div>
              <div class="picker-nav">
                <button id="prev-month" aria-label="Previous month">‹</button>
                <button id="next-month" aria-label="Next month">›</button>
              </div>
            </div>
            <div class="calendar" id="calendar"></div>

            <div id="slots-area" hidden>
              <div class="slots-header" id="slots-header"></div>
              <div class="slots" id="slots"></div>
            </div>

            <div class="loading" id="loading">Loading availability…</div>
            <div class="empty-state" id="empty" hidden>No availability in this month — try the next one.</div>
          </div>

          <form class="form" id="step-form" hidden novalidate>
            <div>
              <div class="slots-header" id="confirm-when"></div>
              <a href="#" id="back-to-time" class="link-back">← Pick a different time</a>
            </div>
            <!-- Honeypot: invisible to humans, bots fill it in. Server rejects any non-empty value. -->
            <div class="hp-field" aria-hidden="true">
              <label for="hp_website">Website (leave blank)</label>
              <input id="hp_website" name="hp_website" type="text" tabindex="-1" autocomplete="off">
            </div>
            <div id="form-fields"></div>
            <div id="disqualify-notice" class="disqualify-notice" hidden></div>
            <div id="form-error" class="notice" hidden></div>
            <button type="submit" class="btn" id="submit-btn">Confirm booking</button>
          </form>
        </section>
      </div>
    </div>

    <footer>&copy; Jax Media Team · <a href="https://jaxmediateam.com">jaxmediateam.com</a></footer>
  </main>
  <script src="/js/booking.js"></script>
</body>
</html>
