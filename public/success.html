<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking confirmed · Jax Media Team</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="shell">
    <div class="brand">
      <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
        <div class="brand-mark">JMT</div>
        <div class="brand-name">Jax Media Team</div>
      </a>
    </div>

    <div class="card success-card">
      <div class="success-icon">✓</div>
      <h1>You're booked</h1>
      <p class="subtitle" id="confirm-line">A calendar invite is on its way to your inbox.</p>
      <p class="success-detail" id="when-line"></p>
      <p class="success-detail" id="meet-line"></p>
      <p style="margin-top:24px"><a href="/">Schedule another call</a></p>
    </div>

    <footer>&copy; Jax Media Team</footer>
  </main>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var when = p.get('when');
      var hangout = p.get('meet');
      if (when) {
        try {
          var d = new Date(when);
          var opts = { weekday: 'long', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' };
          document.getElementById('when-line').textContent = d.toLocaleString(undefined, opts);
        } catch (e) {}
      }
      if (hangout) {
        var el = document.getElementById('meet-line');
        el.innerHTML = 'Join link: <a href="' + hangout.replace(/"/g, '&quot;') + '">' + hangout + '</a>';
      }
    })();
  </script>
</body>
</html>
