<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking confirmed · Jax Media Team</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" type="image/jpeg" href="/img/favicon.jpg" sizes="192x192">
  <link rel="icon" type="image/jpeg" href="/img/favicon-150.jpg" sizes="32x32">
  <link rel="apple-touch-icon" href="/img/favicon.jpg">
</head>
<body>
  <main class="shell">
    <header class="site-header">
      <a class="site-logo" href="/" aria-label="Jax Media Team home">
        <img src="/img/logo.jpg" alt="Jax Media Team">
      </a>
      <div class="header-meta">Schedule a call with <strong>Jax Media Team</strong></div>
    </header>

    <div class="card success-card">
      <div class="success-icon">✓</div>
      <h1 id="success-headline">You're booked.</h1>
      <p class="subtitle" style="margin: 8px auto 16px;" id="confirm-line">A calendar invite is on its way to your inbox.</p>
      <p class="success-detail"><strong id="when-line"></strong></p>
      <p class="success-detail" id="meet-line"></p>
      <p style="margin-top: 28px;"><a href="/" class="link-back">← Schedule another call</a></p>
    </div>

    <footer>&copy; Jax Media Team · <a href="https://jaxmediateam.com">jaxmediateam.com</a></footer>
  </main>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var when = p.get('when');
      var hangout = p.get('meet');
      var type = p.get('type') || '';
      var isReschedule = p.get('rescheduled') === '1';

      if (isReschedule) {
        document.getElementById('success-headline').textContent = "You're rescheduled.";
        document.title = "You're rescheduled · Jax Media Team";
        document.getElementById('confirm-line').textContent = 'An updated calendar invite is on its way to your inbox.';
      }
      if (when) {
        try {
          var d = new Date(when);
          var opts = { weekday: 'long', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' };
          document.getElementById('when-line').textContent = d.toLocaleString(undefined, opts);
        } catch (e) {}
      }
      if (hangout) {
        var el = document.getElementById('meet-line');
        el.innerHTML = 'Join link: <a href="' + hangout.replace(/"/g, '&quot;') + '">' + hangout + '</a>';
      }

      // Conversion tracking — pushes a custom event GTM/GA4 can listen for.
      // GTM trigger: Custom Event = "booking_confirmed".
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: isReschedule ? 'booking_rescheduled' : 'booking_confirmed',
        meeting_type: type,
        meeting_slug: type,
        is_reschedule: isReschedule,
      });
    })();
  </script>
</body>
</html>
